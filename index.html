<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carl's Jr NZ Field Ops</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#0b1320;
  color:white;
  margin:0;
  padding:20px;
}

h1 {margin-bottom:5px;}
.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.kz {
  background:#ffc72c;
  color:black;
  padding:10px;
  border-radius:50%;
  font-weight:bold;
}

.card {
  background:#1c2433;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

select, input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#e31837;
  color:white;
  font-weight:bold;
}

.store {
  background:#1c2433;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  cursor:pointer;
}

.store:hover {
  background:#2a3447;
}

.highlight {
  border:2px solid #ffc72c;
}
</style>
</head>

<body>

<div class="top">
  <div>
    <h1>Carl's Jr NZ</h1>
    <small>Field Ops Tool</small>
  </div>
  <div class="kz">KZ</div>
</div>

<div class="card">
  <b id="count">17 / 17 stores</b>

  <select id="regionFilter">
    <option value="all">All regions</option>
    <option value="Auckland">Auckland</option>
    <option value="Waikato">Waikato</option>
    <option value="Gisborne">Gisborne</option>
  </select>

  <input id="search" placeholder="Search store...">

  <button onclick="resetAll()">Reset</button>
</div>

<div id="stores"></div>

<script>

const data = [
  {name:"Carl's Jr Manukau", region:"Auckland", lat:-36.9928, lng:174.8799},
  {name:"Carl's Jr Mt Wellington", region:"Auckland", lat:-36.922, lng:174.84},
  {name:"Carl's Jr Hamilton", region:"Waikato", lat:-37.787, lng:175.279},
  {name:"Carl's Jr Gisborne", region:"Gisborne", lat:-38.662, lng:178.017}
];

let filtered = data;

function render(){
  const container = document.getElementById("stores");
  container.innerHTML = "";

  document.getElementById("count").innerText =
    filtered.length + " / 17 stores";

  filtered.forEach(s=>{
    const div = document.createElement("div");
    div.className="store";
    div.innerText = s.name + " (" + s.region + ")";

    div.onclick = ()=>{
      chooseMap(s);
    };

    container.appendChild(div);
  });
}

function chooseMap(s){
  const choice = confirm("OK = Apple Maps\nCancel = Google Maps");

  if(choice){
    window.open(`maps://?daddr=${s.lat},${s.lng}`);
  } else {
    window.open(`comgooglemaps://?daddr=${s.lat},${s.lng}`);
  }
}

document.getElementById("regionFilter").onchange = function(){
  const val = this.value;

  if(val === "all"){
    filtered = data;
  } else {
    filtered = data.filter(s=>s.region === val);
  }

  render();
};

document.getElementById("search").oninput = function(){
  const val = this.value.toLowerCase();

  filtered = data.filter(s =>
    s.name.toLowerCase().includes(val)
  );

  render();
};

function resetAll(){
  filtered = data;
  document.getElementById("search").value="";
  document.getElementById("regionFilter").value="all";
  render();
}

render();

</script>

</body>
</html>
